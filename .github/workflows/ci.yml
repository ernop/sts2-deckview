name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  public-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Run map-layout property tests
        run: dotnet run --project layout/layouttest.csproj --configuration Release

      - name: Validate public metadata and assets
        run: python3 scripts/check-metadata.py

      - name: Validate hook script syntax
        run: bash -n scripts/verify-hooks.sh
